<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SeeVar Federation Dashboard</title>
    <style>
        :root { --bg: #111; --card: #1a1a1a; --green: #39ff14; --orange: #ff9900; --red: #ff3333; --text: #eee; --muted: #888; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; margin: 0; padding: 10px 20px; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .top-bar { display: flex; justify-content: space-between; color: var(--green); font-weight: bold; font-size: 0.9em; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .grid { display: flex; gap: 20px; flex: 1; min-height: 0; }
        .panel { flex: 1; background: var(--card); border: 1px solid #333; padding: 20px; display: flex; flex-direction: column; box-shadow: inset 0 0 20px #000; }
        .panel h2 { color: var(--muted); font-size: 0.8em; letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 10px; margin: 0 0 15px 0; }
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 0.85em; font-weight: bold; }
        .led { width: 18px; height: 18px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 900; color: #000; }
        .green { background: var(--green); box-shadow: 0 0 8px var(--green); }
        .orange { background: var(--orange); box-shadow: 0 0 8px var(--orange); }
        .red { background: var(--red); box-shadow: 0 0 8px var(--red); }
        .grey { background: #444; }
        .icon-p { background: linear-gradient(135deg, #1e90ff, #005cbf); color: white; font-size: 3em; font-weight: bold; width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; border-radius: 16px; margin-bottom: 20px; }
        .pf-scoreboard { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; border-bottom: 1px dashed #333; padding-bottom: 15px; margin-bottom: 15px; }
        .pf-val { font-size: 1.5em; font-weight: 900; text-align: center; }
        .pf-lbl { font-size: 0.6em; color: #555; text-align: center; }
        .log-box { margin-top: 15px; border-top: 1px dashed #333; padding-top: 15px; font-size: 0.85em; color: var(--muted); }
        .latest { color: #fff; font-weight: bold; }
    </style>
</head>
<body>
    <div class="top-bar"><span id="tel-mh">--</span><span>JDATE: <span id="live-jd">--</span></span></div>
    <div class="grid">
        <div class="panel">
            <h2>SYSTEM VITALS</h2>
            <div class="row"><span style="color:var(--muted)">WINDOW</span><span id="fw-val">{{ flight_window }}</span></div>
            <div class="row"><span style="color:var(--muted)">SEESTAR</span><div id="link-led" class="led grey"></div></div>
            <div class="row"><span style="color:var(--muted)">WEATHER</span><span id="wth-t">--</span><div id="wth-i" style="margin-left:10px">❓</div></div>
            <div class="target-card" style="border-top:1px dashed #333; margin-top:15px; padding-top:15px">
                <div class="row"><span style="color:var(--muted)">NAME</span><span id="t-name">--</span><div id="t-cnt" class="led orange">00</div></div>
                <div class="row"><span style="color:var(--muted)">LOC</span><span id="t-loc">--</span></div>
                <div class="row"><span style="color:var(--muted)">MAG</span><span id="t-mag" style="color:#88ccff">--</span></div>
            </div>
        </div>
        <div class="panel">
            <div style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;">
                <div class="icon-p">P</div>
                <div id="f-state" style="font-size:2em; font-weight:900; color:#1e90ff">PARKED</div>
                <div id="f-sub" style="font-weight:bold; color:var(--muted)">OFF-DUTY</div>
            </div>
            <div class="row" style="margin-top:auto"><span style="color:var(--muted)">BATTERY</span><span id="v-bat">--%</span></div>
            <div class="row"><span style="color:var(--muted)">S30 TEMP</span><span id="v-tmp">--°C</span></div>
            <div class="row"><span style="color:var(--muted)">STORAGE</span><span id="v-store">-- MB</span></div>
        </div>
        <div class="panel">
            <h2>POSTFLIGHT AUDIT</h2>
            <div class="pf-scoreboard">
                <div><div class="pf-val" id="pf-s">--</div><div class="pf-lbl">SCHED</div></div>
                <div><div class="pf-val" id="pf-a">--</div><div class="pf-lbl">ATT</div></div>
                <div><div class="pf-val" id="pf-o" style="color:var(--green)">--</div><div class="pf-lbl">OBS</div></div>
                <div><div class="pf-val" id="pf-f" style="color:var(--orange)">--</div><div class="pf-lbl">FAIL</div></div>
            </div>
            <div class="row"><span style="color:var(--muted)">PHOTOMETRY</span><div id="led-p" class="led grey"></div></div>
            <div class="row" style="margin-bottom:20px"><span style="color:var(--muted)">AAVSO READY</span><div id="led-a" class="led grey"></div></div>
            <div id="pf-list" style="font-size:0.75em; flex:1; overflow-y:auto"></div>
            <div class="log-box" id="f-log"></div>
        </div>
    </div>
    <script>
        const targetData = {{ target_data | tojson | safe }};
        let tickerIndex = 0;
        function updateTicker() {
            if (!targetData || targetData.length === 0) return;
            const t = targetData[tickerIndex];
            document.getElementById('t-name').innerText = t.name || t.star_name || "UNKNOWN";
            document.getElementById('t-loc').innerText = `RA: ${t.ra} DEC: ${t.dec}`;
            const maxM = t.max_mag != null ? t.max_mag : "--";
            const minM = t.min_mag != null ? t.min_mag : "--";
            const perD = t.period_days != null ? (t.period_days < 1 ? (t.period_days * 24).toFixed(1) + "h" : t.period_days.toFixed(1) + "d") : "--";
            document.getElementById('t-mag').innerText = `${maxM} – ${minM} · ${perD} (V)`;
            document.getElementById('t-cnt').innerText = String(targetData.length).padStart(2, '0');
            tickerIndex = (tickerIndex + 1) % targetData.length;
        }
        function fetchTelemetry() {
            fetch('/telemetry').then(r => r.json()).then(d => {
                document.getElementById('tel-mh').innerText = d.maidenhead;
                document.getElementById('wth-t').innerText = d.weather.status;
                document.getElementById('wth-i').innerText = d.weather.icon;
                document.getElementById('f-state').innerText = d.orchestrator.state;
                document.getElementById('f-sub').innerText = d.orchestrator.sub;
                document.getElementById('v-bat').innerText = d.hardware.battery + "%";
                document.getElementById('v-tmp').innerText = d.hardware.temp_c + "°C";
                document.getElementById('v-store').innerText = d.hardware.storage_mb + " MB";
                document.getElementById('link-led').className = 'led ' + (d.hardware.link_status === "ACTIVE" ? "green" : "red");
                const sb = d.postflight.scoreboard;
                document.getElementById('pf-s').innerText = sb.scheduled;
                document.getElementById('pf-a').innerText = sb.attempted;
                document.getElementById('pf-obs').innerText = sb.observed;
                document.getElementById('pf-fail').innerText = sb.failed;
                document.getElementById('led-p').className = 'led ' + d.postflight.phot_led;
                document.getElementById('led-a').className = 'led ' + d.postflight.aavso_led;
                if(d.orchestrator.flight_log) {
                    const logs = d.orchestrator.flight_log.slice(-5);
                    document.getElementById('f-log').innerHTML = logs.map((l, i) => `<div class="${i === logs.length-1 ? 'latest' : ''}">${l}</div>`).join('');
                }
                document.getElementById('pf-list').innerHTML = d.postflight.log.map(r => 
                    `<div style="display:flex; justify-content:space-between; border-bottom:1px solid #222; padding:4px 0"><span>${r.time}</span><span>${r.name}</span><span style="color:var(--green)">${r.mag}</span></div>`).join('');
            });
        }
        setInterval(updateTicker, 4000); setInterval(fetchTelemetry, 2000);
        setInterval(() => { document.getElementById('live-jd').innerText = ((new Date().getTime() / 86400000) + 2440587.5).toFixed(4); }, 1000);
        updateTicker(); fetchTelemetry();
    </script>
</body>
</html>
