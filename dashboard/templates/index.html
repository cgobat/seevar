<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta http-equiv="refresh" content="5">
    <title>Federation Fleet Command</title>
    <style>
        body { background: #050505; color: #d0d0d0; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        .banner { background: #000; color: #00ff00; padding: 15px; border-bottom: 1px solid #1a1a1a; font-size: 1.5em; letter-spacing: 10px; font-weight: 900; }
        .deck { display: grid; grid-template-columns: 320px 1fr 320px; height: calc(100vh - 65px); padding: 20px; gap: 20px; }
        .panel { background: #0c0c0c; border: 1px solid #1a1a1a; padding: 25px; display: flex; flex-direction: column; }
        .led-row { display: flex; justify-content: space-between; margin: 12px 0; align-items: center; border-bottom: 1px solid #111; padding-bottom: 5px; font-size: 0.8em; }
        .led { width: 14px; height: 14px; border-radius: 2px; }
        .led-green { background: #00ff00; box-shadow: 0 0 10px #00ff00; }
        .led-orange { background: #ffaa00; box-shadow: 0 0 10px #ffaa00; }
        .led-grey { background: #222; }
        .led-red { background: #ff0000; }
        .active-val { color: #00ff00; font-weight: bold; }
        .hero { font-size: 6em; font-weight: 900; letter-spacing: -5px; color: #151515; }
        .tracking { color: #00ff00; text-shadow: 0 0 30px #00ff00; }
    </style>
</head>
<body>
    <div class="banner">{{ env.maidenhead }} <span style="font-size: 0.4em; color: #222; float: right;">STATION_HAARLEM_S30</span></div>
    <div class="deck">
        <div class="panel">
            <h3>FLEET_COMMAND</h3>
            <div class="led-row"><span>WILLIAMINA</span><div class="led {{ env.williamina_led }}"></div></div>
            <div class="led-row"><span>ANNIE</span><div class="led {{ env.annie_led }}"></div></div>
            <div class="led-row"><span>HENRIETTA</span><div class="led {{ env.henrietta_led }}"></div></div>
        </div>
        <div class="panel" style="justify-content: center; align-items: center; background: radial-gradient(circle, #0f0f0f 0%, #000 100%);">
            <div class="hero {% if env.target.name != 'STANDBY' %}tracking{% endif %}">{{ env.target.name }}</div>
            {% if env.target.name != 'STANDBY' %}
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 40px;">
                <div><div style="font-size:0.7em; color:#333;">RA</div><div style="font-size:2.5em; color:#00ff00;">{{ env.target.ra }}</div></div>
                <div><div style="font-size:0.7em; color:#333;">DEC</div><div style="font-size:2.5em; color:#00ff00;">{{ env.target.dec }}</div></div>
            </div>
            {% endif %}
        </div>
        <div class="panel">
            <h3>SYSTEM_VITALS</h3>
            <div class="led-row"><span>GPS_LOCK</span><div class="led {{ env.gps_led }}"></div></div>
            <div class="led-row"><span>PPS_SYNC</span><span class="active-val">{{ env.pps_offset }}</span></div>
            <div style="margin-top: auto; border-top: 1px solid #111; padding-top: 20px;">
                <div style="font-size:0.6em; color:#333;">JULIAN_DATE</div>
                <div style="font-size:1.2em; color:#1a1a1a; font-weight:bold;">{{ env.jd }}</div>
            </div>
        </div>
    </div>
</body>
</html>
